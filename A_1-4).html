<!DOCTYPE html>
<html lang="en">
<head>
    <title>Responsive Navigation Bar</title>

    <style>
       
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

    
        nav {
            background-color: #1e3a8a;
            padding: 15px 0;
        }

 
        ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0;
            margin: 0;

         
            flex-wrap: wrap;
        }

 
        ul li a {
            text-decoration: none;
            color: white;
            font-size: 18px;
            padding: 10px 18px;
            border-radius: 8px;
            transition: 0.3s ease-in-out;
        }

  
        ul li a:hover {
            background-color: #facc15;
            color: black;
        }

        @media (max-width: 600px) {
            ul {
                flex-direction: column;
                align-items: center;
            }

            ul li a {
                display: block;
                width: 200px;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

</body>
</html>
