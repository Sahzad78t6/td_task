<!DOCTYPE html>
<html lang="en">
<head>
    <title>Creative Image Slider</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dbeafe, #f0f9ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .slider {
            width: 700px;
            height: 400px;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }


        .slides {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            animation: fade 1s;
        }

        .slides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .caption {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 12px;
            font-size: 18px;
            text-align: center;
        }

        @keyframes fade {
            from {opacity: 0.4;}
            to {opacity: 1;}
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 22px;
            padding: 12px;
            border: none;
            cursor: pointer;
            border-radius: 50%;
        }

        .prev { left: 15px; }
        .next { right: 15px; }

        .prev:hover, .next:hover {
            background: yellow;
            color: black;
        }

        .control {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.7);
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }


        .dots {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
        }

        .dot {
            height: 12px;
            width: 12px;
            margin: 5px;
            background-color: white;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
            transition: 0.3s;
        }

        .active {
            background-color: yellow;
        }

    </style>
</head>

<body>

    <div class="slider">


        <div class="slides">
            <img src="https://picsum.photos/id/1015/700/400">
            <div class="caption">Beautiful Mountains</div>
        </div>

        <div class="slides">
            <img src="https://picsum.photos/id/1016/700/400">
            <div class="caption">Peaceful Nature View</div>
        </div>

        <div class="slides">
            <img src="https://picsum.photos/id/1025/700/400">
            <div class="caption">Amazing Wildlife</div>
        </div>


        <div class="slides">
            <img src="https://picsum.photos/id/1035/700/400">
            <div class="caption">Sunset Beach</div>
        </div>

        <div class="slides">
            <img src="https://picsum.photos/id/1045/700/400">
            <div class="caption">City Night Lights</div>
        </div>


        <button class="prev" onclick="changeSlide(-1)">❮</button>
        <button class="next" onclick="changeSlide(1)">❯</button>

        <button class="control" onclick="togglePlay()">⏸ Pause</button>

        <div class="dots">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
            <span class="dot" onclick="currentSlide(5)"></span>
        </div>

    </div>

    <script>
        let slideIndex = 0;
        let slides = document.getElementsByClassName("slides");
        let dots = document.getElementsByClassName("dot");
        let playing = true;
        let timer;

        function showSlides() {
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            slideIndex++;
            if (slideIndex > slides.length) {
                slideIndex = 1;
            }

            for (let i = 0; i < dots.length; i++) {
                dots[i].classList.remove("active");
            }

            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].classList.add("active");

            timer = setTimeout(showSlides, 3000);
        }


        function changeSlide(n) {
            clearTimeout(timer);
            slideIndex += n - 1;
            if (slideIndex < 0) slideIndex = slides.length - 1;
            showSlides();
        }


        function currentSlide(n) {
            clearTimeout(timer);
            slideIndex = n - 1;
            showSlides();
        }


        function togglePlay() {
            let btn = document.querySelector(".control");

            if (playing) {
                clearTimeout(timer);
                btn.innerHTML = "▶ Play";
                playing = false;
            } else {
                showSlides();
                btn.innerHTML = "⏸ Pause";
                playing = true;
            }
        }

        showSlides();
    </script>

</body>
</html>
