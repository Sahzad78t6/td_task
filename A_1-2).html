<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weekly Timetable</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    table {
      border-collapse: collapse;
      margin: auto;
      background: white;
    }

    th, td {
      border: 2px solid black;
      padding: 10px;
      text-align: center;
      width: 120px;
    }

    th {
      background-color: #e6e6ff;
    }
  </style>
</head>

<body>

<h2>Weekly Timetable</h2>

<table>
  <tr>
    <th>Time</th>
    <th>Monday</th>
    <th>Tuesday</th>
    <th>Wednesday</th>
    <th>Thursday</th>
    <th>Friday</th>
  </tr>

  <tr>
    <td>1:00</td>
    <td rowspan="2" style="background-color: #6666ff;">Office</td>
    <td style="background-color: #ff0000
;"></td>
    <td rowspan="3" style="background-color: #6666ff;">Office</td>
    <td rowspan="5" style="background-color: #ccffff;">IT Workshop</td>
    <td rowspan="4" style="background-color: #80ff80;">WT</td>
  </tr>

  <tr>
    <td>2:00</td>
    <td rowspan="2" style="background-color:#ffccff;">Dept Meeting</td>
  </tr>

  <tr>
    <td>3:00</td>
    <td rowspan="3" style="background-color: #80ff80;">WT</td>
    
  </tr>

  <tr>
    <td>4:00</td>
    <td style="background-color: #ff0000
;"></td>
    <td rowspan="2" style="background-color:#ffccff;">Dept Meeting</td>
  </tr>
  <tr>
    <td>5:00</td>
    <td style="background-color:#ffccff;">Dept Meeting</td>
    <td style="background-color: #6666ff;">Office</td>
  </tr>
</table>

</body>
</html>
