<!DOCTYPE html>
<html lang="en">
<head>
    <title>DOB Validation & Age Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dbeafe, #f0f9ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            width: 400px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        h2 {
            color: darkblue;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button {
            padding: 10px 20px;
            background: #2563eb;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        p {
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Date of Birth Input</h2>

    
        <label><b>Select Date of Birth:</b></label><br>
        <input type="date" id="dob">

        <br>
        <button onclick="calculateAge()">Submit</button>

        <p id="output"></p>
    </div>

    <script>
       
        let today = new Date().toISOString().split("T")[0];
        document.getElementById("dob").setAttribute("max", today);

        function calculateAge() {
            let dobValue = document.getElementById("dob").value;

            if (dobValue === "") {
                alert("⚠ Please select your Date of Birth!");
                return;
            }

            let dob = new Date(dobValue);
            let currentDate = new Date();

      
            let age = currentDate.getFullYear() - dob.getFullYear();
            let monthDiff = currentDate.getMonth() - dob.getMonth();

            if (monthDiff < 0 || (monthDiff === 0 && currentDate.getDate() < dob.getDate())) {
                age--;
            }

           
            let day = String(dob.getDate()).padStart(2, "0");
            let month = String(dob.getMonth() + 1).padStart(2, "0");
            let year = dob.getFullYear();

            let formattedDOB = `${day}/${month}/${year}`;

         
            document.getElementById("output").innerHTML =
                "📌 Date of Birth: <b>" + formattedDOB + "</b><br>" +
                "🎂 Age: <b>" + age + " years</b>";
        }
    </script>

</body>
</html>
